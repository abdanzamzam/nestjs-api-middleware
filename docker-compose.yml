version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: api_middleware_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_middleware
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_middleware_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_middleware_app
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules
    networks:
      - api_middleware_network
    command: npm run start:dev

volumes:
  postgres_data:

networks:
  api_middleware_network:
    driver: bridge
